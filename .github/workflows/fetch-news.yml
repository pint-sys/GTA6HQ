name: 📰 Fetch GTA 6 News

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: node fetch-news.js
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
