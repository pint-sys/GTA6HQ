<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="description" content="GTA6HQ — independent GTA 6 community hub. News, mods, guides, characters, Q&A. Not affiliated with Rockstar."/>
<title>GTA6HQ — Independent GTA 6 Community Hub</title>
<meta property="og:title" content="GTA6HQ — Independent GTA 6 Community Hub"/>
<meta property="og:url" content="https://gta6hq.vercel.app/"/>
<link rel="canonical" href="https://gta6hq.vercel.app/"/>
<link rel="icon" type="image/svg+xml" href="favicon/favicon.svg"/>
<link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="favicon/favicon-192x192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Proza+Libre:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a0e;--bg2:#111118;--bg3:#18181f;
  --card:#1a1a23;--card2:#1e1e28;
  --border:#2a2a38;--border2:#333345;
  --gold:#f0b429;--gold2:#c8920e;
  --pink:#ff3c6e;--pink2:#c8204e;
  --cyan:#00d4ff;--cyan2:#009dbf;
  --green:#00e676;--purple:#a855f7;
  --text:#f0f0f8;--text2:#a0a0c0;--text3:#6a6a88;
  --r:8px;--r2:12px;
  --fd:'Oswald',sans-serif;
  --fb:'Proza Libre',sans-serif;
  --fu:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:16px;line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}
a:focus-visible,button:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:2px}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.skip-link{position:absolute;top:-48px;left:8px;z-index:10000;background:var(--gold);color:#111;padding:10px 18px;border-radius:0 0 8px 8px;font-family:var(--fu);font-weight:700;font-size:13px;transition:top .15s}
.skip-link:focus{top:0}
.scroll-progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--pink),var(--gold));z-index:10001;width:0%;transition:width .1s linear}
.offline-banner{position:fixed;top:0;left:0;right:0;background:var(--pink);color:#fff;text-align:center;padding:9px 16px;font-family:var(--fu);font-size:13px;font-weight:600;z-index:10002;transform:translateY(-100%);transition:transform .25s ease}
.offline-banner.show{transform:translateY(0)}
.topbar{background:#0d0d14;border-bottom:1px solid var(--border);padding:6px 20px;display:flex;align-items:center;justify-content:space-between;font-family:var(--fu);font-size:12px;color:var(--text3)}
.topbar a{color:var(--gold);margin-left:12px}
.live-badge{display:inline-flex;align-items:center;gap:5px;color:var(--pink)}
.live-dot{width:7px;height:7px;background:var(--pink);border-radius:50%;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
nav{position:sticky;top:0;z-index:1000;background:rgba(10,10,14,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px}
.nav-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;height:60px;gap:0}
.logo{font-family:var(--fd);font-size:28px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-right:24px;flex-shrink:0}
.logo span{color:var(--pink)}
.nav-links{display:flex;align-items:center;gap:2px;flex:1}
.nav-links a{color:var(--text2);padding:6px 11px;border-radius:var(--r);font-family:var(--fu);font-size:13px;font-weight:500;transition:.15s;white-space:nowrap}
.nav-links a:hover,.nav-links a.active{color:var(--gold);background:rgba(240,180,41,.08)}
.nav-links a.active{border-bottom:2px solid var(--gold)}
.nav-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.search-wrap{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 14px;gap:8px;position:relative}
.search-wrap input{background:transparent;border:none;outline:none;color:var(--text);font-family:var(--fu);font-size:13px;width:170px}
.search-wrap input::placeholder{color:var(--text3)}
.btn{padding:7px 16px;border-radius:20px;font-family:var(--fu);font-size:13px;font-weight:600;border:none;transition:.15s}
.btn-gold{background:var(--gold);color:#111}
.btn-gold:hover{background:var(--gold2)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.hamburger-btn{flex-direction:column;justify-content:center;align-items:center;gap:4px;width:34px;height:34px;background:transparent;border:1px solid var(--border2);border-radius:6px;flex-shrink:0;display:none}
.hamburger-btn span{width:16px;height:2px;background:var(--text);border-radius:2px;transition:.2s}
.hamburger-btn[aria-expanded="true"] span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.hamburger-btn[aria-expanded="true"] span:nth-child(2){opacity:0}
.hamburger-btn[aria-expanded="true"] span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
@media(max-width:960px){
  .hamburger-btn{display:flex}
  .nav-links{position:absolute;top:60px;left:0;right:0;flex-direction:column;align-items:stretch;gap:0;background:rgba(10,10,14,.98);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .25s ease}
  .nav-links.open{max-height:400px}
  .nav-links a{padding:14px 20px;border-bottom:1px solid var(--border);border-radius:0}
}
.page-tabs{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:60px;z-index:900}
.page-tabs-inner{max-width:1300px;margin:0 auto;padding:0 20px;display:flex;overflow-x:auto;gap:0}
.ptl{font-family:var(--fu);font-size:13px;font-weight:500;padding:12px 16px;border:none;background:transparent;color:var(--text3);border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;display:block}
.ptl:hover{color:var(--text)}
.ptl.active{color:var(--gold);border-bottom-color:var(--gold)}
.ticker-wrap{background:var(--pink);overflow:hidden;height:36px;display:flex;align-items:center}
.ticker-label{background:var(--bg);color:var(--pink);font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:0 16px;height:100%;display:flex;align-items:center;flex-shrink:0}
.ticker-inner{overflow:hidden;flex:1}
.ticker-track{display:flex;white-space:nowrap;animation:ticker 35s linear infinite}
.ticker-track:hover{animation-play-state:paused}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{padding:0 36px;font-family:var(--fu);font-size:13px;font-weight:600;color:#fff}
.hero{position:relative;min-height:520px;display:flex;align-items:center;overflow:hidden;background:#150a24}
.hero-scene{position:absolute;inset:0;z-index:0}
.hero-scene svg{width:100%;height:100%;display:block}
.hero-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(100deg,rgba(10,10,14,.88) 0%,rgba(10,10,14,.6) 38%,rgba(10,10,14,.25) 62%,rgba(10,10,14,.55) 100%)}
.hero-grid{position:absolute;inset:0;z-index:2;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.2}
.hero-content{position:relative;z-index:3;max-width:1300px;margin:0 auto;padding:60px 20px;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center}
.hero-eyebrow{font-family:var(--fu);font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--pink);margin-bottom:12px}
.hero-title{font-family:var(--fd);font-size:clamp(42px,5vw,70px);font-weight:700;line-height:1;text-transform:uppercase;letter-spacing:2px;margin-bottom:16px}
.hero-title .accent{color:var(--gold)}
.hero-sub{font-size:16px;color:var(--text2);line-height:1.6;margin-bottom:28px}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}
.btn-hero{padding:12px 28px;border-radius:4px;font-family:var(--fd);font-size:15px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border:none;transition:.15s}
.btn-hg{background:var(--gold);color:#0a0a0e}
.btn-hg:hover{background:var(--gold2)}
.btn-hp{background:transparent;border:2px solid var(--pink);color:var(--pink)}
.btn-hp:hover{background:var(--pink);color:#fff}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:22px}
.hero-stat{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center}
.hero-stat-num{font-family:var(--fd);font-size:24px;font-weight:700;color:var(--gold)}
.hero-stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.countdown-box{background:var(--bg2);border:1px solid rgba(240,180,41,.2);border-radius:var(--r2);padding:20px;text-align:center}
.cd-title{font-family:var(--fd);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.cd-units{display:flex;justify-content:center;gap:12px}
.cd-unit{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;min-width:60px;text-align:center}
.cd-num{font-family:var(--fd);font-size:32px;font-weight:700;color:var(--gold);line-height:1}
.cd-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.cd-platform{margin-top:12px;font-size:12px;color:var(--text3)}
.cd-platform span{color:var(--cyan);font-weight:600}
.cd-done{font-family:var(--fd);font-size:26px;font-weight:700;letter-spacing:1px;color:var(--gold);text-transform:uppercase;padding:6px 0}
@media(max-width:960px){.hero-content{grid-template-columns:1fr}}
@media(max-width:600px){.hero-stats{grid-template-columns:1fr 1fr}.cd-units{gap:6px}.cd-unit{padding:8px 10px;min-width:50px}.cd-num{font-size:24px}}
.container{max-width:1300px;margin:0 auto;padding:0 20px}
.section{padding:44px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.section-title{font-family:var(--fd);font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.page-grid{display:grid;grid-template-columns:1fr 320px;gap:26px;max-width:1300px;margin:0 auto;padding:0 20px}
@media(max-width:960px){.page-grid{grid-template-columns:1fr}.sidebar{display:none}}
.hero-scroll-indicator{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--text3);font-family:var(--fu);font-size:11px;text-transform:uppercase;letter-spacing:1px;z-index:3;animation:bounce 2s infinite}
.hero-scroll-indicator svg{width:18px;height:18px}
@keyframes bounce{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,8px)}}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:.2s}
.card:hover{border-color:var(--border2);transform:translateY(-2px)}
.card-thumb-ph{width:100%;aspect-ratio:16/9;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-thumb-ph img{width:100%;height:100%;object-fit:cover}
.card-body{padding:14px}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:7px}
.tag{font-family:var(--fu);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px}
.tag-news{background:rgba(255,60,110,.12);color:var(--pink)}
.tag-mod{background:rgba(0,212,255,.12);color:var(--cyan)}
.tag-guide{background:rgba(0,230,118,.12);color:var(--green)}
.tag-question{background:rgba(240,180,41,.12);color:var(--gold)}
.tag-hot{background:var(--pink);color:#fff}
.tag-new{background:var(--green);color:#0a0a0e}
.tag-update{background:var(--gold);color:#111}
.tag-official{background:rgba(168,85,247,.15);color:var(--purple)}
.card-title{font-family:var(--fb);font-size:14px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:7px}
.card-title a:hover{color:var(--gold)}
.card-meta{font-family:var(--fu);font-size:12px;color:var(--text3);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.card-actions{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-top:1px solid var(--border);background:var(--bg3)}
.like-btn{display:flex;align-items:center;gap:5px;font-family:var(--fu);font-size:12px;color:var(--text3);padding:4px 8px;border-radius:4px;border:none;background:transparent;transition:.15s}
.like-btn:hover{color:var(--pink);background:rgba(255,60,110,.08)}
.like-btn.liked{color:var(--pink)}
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.characters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.tabs{display:flex;gap:3px;margin-bottom:16px;flex-wrap:wrap}
.tab{font-family:var(--fu);font-size:12px;font-weight:500;padding:7px 14px;border:1px solid var(--border);background:var(--bg3);color:var(--text3);border-radius:20px;transition:.15s}
.tab:hover{color:var(--text);border-color:var(--border2)}
.tab.active{background:var(--gold);color:#111;border-color:var(--gold)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);width:100%;max-width:440px;overflow:hidden;max-height:90vh;overflow-y:auto}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:var(--fd);font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gold)}
.modal-close{background:transparent;border:none;color:var(--text3);font-size:22px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:22px}
.form-group{margin-bottom:14px}
.form-label{font-family:var(--fu);font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:block}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:9px 13px;color:var(--text);font-family:var(--fu);font-size:13px;outline:none;transition:.15s}
.form-input:focus{border-color:var(--gold)}
.form-tabs{display:flex;gap:0;margin-bottom:20px}
.form-tab{flex:1;padding:9px;text-align:center;font-family:var(--fu);font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--bg3);color:var(--text3);transition:.15s}
.form-tab:first-child{border-radius:var(--r) 0 0 var(--r)}
.form-tab:last-child{border-radius:0 var(--r) var(--r) 0}
.form-tab.active{background:var(--gold);color:#111;border-color:var(--gold)}
.btn-submit{width:100%;background:var(--gold);color:#111;border:none;padding:11px;border-radius:var(--r);font-family:var(--fd);font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1px;transition:.15s;margin-top:4px}
.btn-submit:hover{background:var(--gold2)}
.modal-footer{padding:12px 22px;border-top:1px solid var(--border);text-align:center;font-size:12px;color:var(--text3)}
.tab-page{display:none;position:fixed;inset:0;background:var(--bg);z-index:3500;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tab-page-hdr{position:sticky;top:0;background:rgba(10,10,14,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:10}
.tab-page-hdr-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;height:54px;gap:14px;padding:0 20px}
.tab-page-back{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text);border-radius:var(--r);padding:6px 14px;font-family:var(--fu);font-size:13px;display:flex;align-items:center;gap:6px;transition:.15s}
.tab-page-back:hover{background:rgba(255,255,255,.12)}
.tab-page-title{font-family:var(--fd);font-size:17px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gold)}
.tab-page-subtabs{max-width:1100px;margin:0 auto;display:flex;gap:0;overflow-x:auto;padding:0 20px;scrollbar-width:none}
.tab-page-subtabs::-webkit-scrollbar{display:none}
.ntab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);padding:10px 16px;font-family:var(--fu);font-size:13px;font-weight:600;white-space:nowrap;transition:.15s}
.ntab:hover{color:var(--gold)}.ntab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-page-content{max-width:1100px;margin:0 auto;padding:20px}
.notify{position:fixed;bottom:22px;right:22px;background:var(--green);color:#0a0a0e;padding:10px 18px;border-radius:8px;font-family:var(--fu);font-size:13px;font-weight:700;z-index:6000;transform:translateY(80px);transition:.3s;max-width:320px}
.notify.show{transform:translateY(0)}
.disc-float{position:fixed;bottom:22px;right:22px;background:#5865F2;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:1500;box-shadow:0 4px 18px rgba(88,101,242,.4);transition:.2s;font-size:22px}
.disc-float:hover{transform:scale(1.1)}
.back-to-top{position:fixed;bottom:22px;right:80px;width:42px;height:42px;border-radius:50%;background:var(--card);border:1px solid var(--border2);color:var(--gold);display:flex;align-items:center;justify-content:center;z-index:1500;opacity:0;pointer-events:none;transform:translateY(10px);transition:.25s;font-size:18px}
.back-to-top.show{opacity:1;pointer-events:all;transform:translateY(0)}
.back-to-top:hover{border-color:var(--gold);background:rgba(240,180,41,.1)}
.auto-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);border-radius:4px;padding:3px 8px;font-size:11px;font-weight:600;color:var(--cyan);font-family:var(--fu)}
.id-search-row{display:flex;gap:9px;margin-bottom:18px}
.id-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:9px 14px;color:var(--text);font-family:var(--fu);font-size:13px;outline:none}
.id-input:focus{border-color:var(--gold)}
.btn-sid{background:var(--gold);color:#111;border:none;padding:9px 18px;border-radius:var(--r);font-family:var(--fu);font-size:13px;font-weight:700}
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--card2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.6s ease-in-out infinite;border-radius:var(--r)}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.skel-thumb{width:100%;aspect-ratio:16/10}
.skel-line{height:12px;margin:10px 14px}
.skel-line.short{width:60%}
.skel-line.tiny{height:9px;width:40%;margin-top:6px}
footer{background:#060608;border-top:1px solid var(--border);padding:44px 20px 18px}
.footer-grid{max-width:1300px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:36px;padding-bottom:36px;border-bottom:1px solid var(--border)}
@media(max-width:960px){.footer-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.footer-grid{grid-template-columns:1fr}}
.footer-logo{font-family:var(--fd);font-size:26px;font-weight:700;color:var(--gold);margin-bottom:10px}
.footer-logo span{color:var(--pink)}
.footer-desc{font-size:13px;color:var(--text3);line-height:1.7;max-width:240px}
.footer-col-title{font-family:var(--fd);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text);margin-bottom:12px}
.footer-links{display:flex;flex-direction:column;gap:7px}
.footer-links a{font-size:12px;color:var(--text3);transition:.15s}
.footer-links a:hover{color:var(--gold)}
.footer-bottom{max-width:1300px;margin:0 auto;padding-top:18px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text3);flex-wrap:wrap;gap:8px}
</style>
</head>
<body>
<div class="scroll-progress" id="scrollProgress"></div>
<div id="authDebugPanel" style="position:fixed;top:40px;left:10px;background:#000;color:#0f0;font-family:monospace;font-size:12px;padding:12px 14px;border-radius:8px;z-index:99999;max-width:360px;white-space:pre-wrap;border:2px solid #0f0;line-height:1.6">Loading auth debug info…</div>
<div class="offline-banner" id="offlineBanner" role="status" aria-live="polite">📡 You're offline — live content won't update until your connection is back.</div>
<a class="skip-link" href="#home">Skip to main content</a>

<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getFirestore, collection, getDocs, doc, getDoc, setDoc, deleteDoc, query, orderBy, limit, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail, updateProfile } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

const CFG = {
  apiKey:'AIzaSyB8hyGumMpfXfupsEhhd53Zg8JDoTcqfzA',
  authDomain:'gta6hq-befa7.firebaseapp.com',
  projectId:'gta6hq-befa7',
  storageBucket:'gta6hq-befa7.firebasestorage.app'
};

let db=null, auth=null;
try { const app=initializeApp(CFG); db=getFirestore(app); auth=getAuth(app); } catch(e){ console.error('[firebase]',e.message); }

window.fetchLiveNews = async function(){
  if(!db) return [];
  try {
    const q = query(collection(db,'automated_news'), orderBy('timestamp','desc'), limit(12));
    return (await getDocs(q)).docs.map(d=>({id:d.id,...d.data()}));
  } catch(e){ console.error(e); return []; }
};

window.FB = {
  ready: !!(db && auth),
  register: async (email, password, username) => {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: username });
    await setDoc(doc(db, 'users', cred.user.uid), {
      username, email, createdAt: serverTimestamp()
    });
    return cred.user;
  },
  signIn: (email, password) => signInWithEmailAndPassword(auth, email, password).then(c => c.user),
  signOutUser: () => signOut(auth),
  resetPassword: (email) => sendPasswordResetEmail(auth, email),
  onAuthChange: (cb) => onAuthStateChanged(auth, cb),
  checkAdmin: async (uid) => {
    if (!uid) return false;
    try {
      const s = await getDoc(doc(db, 'admins', uid));
      console.log('[admin check] uid:', uid, '-> exists:', s.exists());
      return s.exists();
    } catch(e){
      console.error('[admin check] FAILED for uid:', uid, '-', e.code || e.message, e);
      return false;
    }
  },
  getAdminDoc: async uid => { const s=await getDoc(doc(db,'admins',uid)); return s.exists(); },
  getCollection: async name => (await getDocs(collection(db, name))).docs.map(d => ({ id: d.id, ...d.data() })),
  setDoc: (c, id, data) => setDoc(doc(db, c, id), data),
  deleteDoc: (c, id) => deleteDoc(doc(db, c, id)),
};
window.dispatchEvent(new Event('fb-ready'));
</script>
<script>
'use strict';

const SK='gta6hq_v4';
const DEF={loggedIn:false,username:'Guest',userId:null,liked:[],completedJobs:[],customJobs:[]};
function loadState(){
  try{
    const r=localStorage.getItem(SK);
    if(!r) return {...DEF,liked:new Set()};
    const p=JSON.parse(r);
    return{...DEF,...p,liked:new Set(Array.isArray(p.liked)?p.liked:[]),completedJobs:Array.isArray(p.completedJobs)?p.completedJobs:[],customJobs:Array.isArray(p.customJobs)?p.customJobs:[]};
  }catch(e){return{...DEF,liked:new Set()};}
}
const S=loadState();
let _t=null;
function save(){clearTimeout(_t);_t=setTimeout(()=>{try{localStorage.setItem(SK,JSON.stringify({...S,liked:[...S.liked]}));}catch(e){}},400);}

const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const $=id=>document.getElementById(id);
const setHTML=(id,h)=>{const e=$(id);if(e)e.innerHTML=h;};
let _adminCache = false;
const isAdmin=()=>_adminCache;

function notify(msg){
  const t=$('notifyToast'),m=$('notifyMsg');
  if(!t||!m)return;
  m.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3600);
}
function openModal(id){const e=$(id);if(e)e.classList.add('open');}
function closeModal(id){const e=$(id);if(e)e.classList.remove('open');}
function closeModalOnOverlay(ev,id){if(ev.target===$(id))closeModal(id);}

function switchAuthTab(mode,btn){
  btn.parentElement.querySelectorAll('.form-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  $('auth-login').style.display=mode==='login'?'block':'none';
  $('auth-register').style.display=mode==='register'?'block':'none';
}
function authErrorMessage(e){
  const code = e?.code || '';
  const map = {
    'auth/email-already-in-use': 'That email already has an account — try signing in instead.',
    'auth/invalid-email': 'That email address looks invalid.',
    'auth/weak-password': 'Password must be at least 6 characters.',
    'auth/user-not-found': 'No account found with that email.',
    'auth/wrong-password': 'Incorrect password.',
    'auth/invalid-credential': 'Incorrect email or password.',
    'auth/too-many-requests': 'Too many attempts — try again in a bit.',
    'auth/missing-password': 'Please enter a password.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}

async function loginUser(){
  const email=($('loginEmail')?.value||'').trim();
  const password=$('loginPassword')?.value||'';
  if(!email||!password){ notify('Enter your email and password.'); return; }
  try{
    await FB.signIn(email,password);
    closeModal('auth-modal');
    notify('✅ Signed in.');
  }catch(e){ notify(authErrorMessage(e)); }
}

async function registerUser(){
  const username=($('registerUsername')?.value||'').trim();
  const email=($('registerEmail')?.value||'').trim();
  const password=$('registerPassword')?.value||'';
  if(!username||!email||!password){ notify('Fill in all fields.'); return; }
  if(password.length<8){ notify('Password must be at least 8 characters.'); return; }
  try{
    await FB.register(email,password,username);
    S.username = username; save();
    closeModal('auth-modal');
    notify('✅ Welcome to GTA6HQ!');
  }catch(e){ notify(authErrorMessage(e)); }
}

async function forgotPassword(){
  const email=($('loginEmail')?.value||'').trim();
  if(!email){ notify('Enter your email above, then click "Forgot password?" again.'); return; }
  try{
    await FB.resetPassword(email);
    notify('📧 Password reset email sent.');
  }catch(e){ notify(authErrorMessage(e)); }
}

function logoutUser(){
  FB.signOutUser().then(()=>notify('Signed out.'));
}

const bodyLock=lock=>{document.documentElement.style.overflow=lock?'hidden':'';document.body.style.overflow=lock?'hidden':'';}
const openTab=id=>{const p=$(id);if(p){p.style.display='block';p.scrollTop=0;bodyLock(true);}};
const closeTab=id=>{const p=$(id);if(p)p.style.display='none';bodyLock(false);}

function updateAdminUI(){
  const admin = isAdmin();
  const dashLink = $('adminDashLink');
  if (dashLink) dashLink.style.display = admin ? 'inline' : 'none';
  ['addJobBtn','addCharacterBtn','addGalleryBtn','addMapPinBtn','reviewAnswersBtn'].forEach(id=>{
    const el = $(id);
    if (el) el.style.display = admin ? 'inline-block' : 'none';
  });
}

function updateAccountUI(user){
  const accountLink = $('adminToggleLink');
  const signOutLink = $('signOutLink');
  const navSignIn = $('navSignInBtn');
  const navJoin = $('navJoinBtn');
  if (accountLink){
    if (user){
      accountLink.textContent = `👤 ${S.username||'Account'}`;
      accountLink.onclick = null;
    } else {
      accountLink.textContent = 'Sign In';
      accountLink.onclick = ()=>openModal('auth-modal');
    }
  }
  if (signOutLink) signOutLink.style.display = user ? 'inline' : 'none';
  if (navSignIn) navSignIn.style.display = user ? 'none' : 'inline-block';
  if (navJoin) navJoin.style.display = user ? 'none' : 'inline-block';
  updateAdminUI();
}

let currentDashTab = 'characters';

function dashListItem(label, sub, onRemoveJs){
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:8px">
      <div>
        <div style="font-weight:600;font-size:13px">${esc(label)}</div>
        ${sub?`<div style="font-size:11px;color:var(--text3)">${esc(sub)}</div>`:''}
      </div>
      <button class="btn-sid" style="background:var(--pink);font-size:11px;padding:5px 10px" onclick="${onRemoveJs}">Remove</button>
    </div>`;
}

const SITE_SETTINGS_KEY = 'gta6hq_site_settings';
const SITE_SETTINGS_DEFAULTS = { tickerEnabled: true, autoApproveAnswers: false };
function loadSiteSettings(){
  try{
    const raw = localStorage.getItem(SITE_SETTINGS_KEY);
    return raw ? { ...SITE_SETTINGS_DEFAULTS, ...JSON.parse(raw) } : { ...SITE_SETTINGS_DEFAULTS };
  }catch(e){ return { ...SITE_SETTINGS_DEFAULTS }; }
}
function saveSiteSettings(s){ try{ localStorage.setItem(SITE_SETTINGS_KEY, JSON.stringify(s)); }catch(e){} }
function applySiteSettings(){
  const s = loadSiteSettings();
  const ticker = document.querySelector('.ticker-wrap');
  if(ticker) ticker.style.display = s.tickerEnabled ? 'flex' : 'none';
}

function renderDashPanel(tab){
  const el = $('dashPanel'); if(!el) return;
  currentDashTab = tab;

  if (tab === 'characters') {
    el.innerHTML = `
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
        <button class="btn btn-gold" style="font-size:12px;padding:6px 14px" onclick="G.openAddCharacterModal()">+ Add Character</button>
      </div>
      ${CHARACTERS_DATA.map((c,i)=>dashListItem(`${c.first} ${c.last}`, c.role, `G.dashRemove('characters',${i})`)).join('') || '<p style="color:var(--text3);font-size:13px">No characters yet.</p>'}`;
  } else if (tab === 'gallery') {
    el.innerHTML = `
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
        <button class="btn btn-gold" style="font-size:12px;padding:6px 14px" onclick="openAddGalleryModal()">+ Add Image</button>
      </div>
      ${GALLERY_DATA.map((g,i)=>dashListItem(g.title, g.cat, `G.dashRemove('gallery',${i})`)).join('') || '<p style="color:var(--text3);font-size:13px">No images yet.</p>'}`;
  } else if (tab === 'sections') {
    el.innerHTML = `
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
        <button class="btn btn-gold" style="font-size:12px;padding:6px 14px" onclick="openAddSectionModal()">+ Add Custom Section</button>
      </div>
      <p style="color:var(--text3);font-size:13px">Manage your custom community tabs and layout blocks here.</p>`;
  } else if (tab === 'jobs') {
    el.innerHTML = `
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:12px">
        <button class="btn-sid" onclick="G.syncCommunityJobs()">🔄 Check for New Job Guides</button>
        <button class="btn btn-gold" style="font-size:12px;padding:6px 14px" onclick="G.openAddJobModal()">+ Add Job Guide</button>
      </div>
      ${GUIDES_DATA.map((j,i)=>dashListItem(j.title, `${j.game.toUpperCase()} · ${j.type} · ${j.reward}`, `G.dashRemove('guides',${i})`)).join('') || '<p style="color:var(--text3);font-size:13px">No job guides yet.</p>'}`;
  } else if (tab === 'mapPins') {
    const unlocked = (typeof isMapUnlocked==='function') ? isMapUnlocked() : false;
    const pins = (typeof MAP_DATA!=='undefined') ? MAP_DATA : [];
    el.innerHTML = `
      <p style="color:var(--text3);font-size:12px;margin-bottom:12px">${unlocked ? 'Click "+ Add Pin" on the Map section, then click anywhere on the map to place a new pin.' : '🔒 The map unlocks at launch (Nov 19, 2026) — pins can be added once GTA 6 releases.'}</p>
      ${pins.map((p,i)=>dashListItem(p.name, (MAP_CAT_LABEL&&MAP_CAT_LABEL[p.category])||p.category, `G.dashRemove('mapPins',${i})`)).join('') || '<p style="color:var(--text3);font-size:13px">No pins yet.</p>'}`;
  } else if (tab === 'site') {
    const s = loadSiteSettings();
    el.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)">
        <div><div style="font-weight:600;font-size:13px">Breaking news ticker</div><div style="font-size:11px;color:var(--text3)">Show the scrolling banner under the nav</div></div>
        <input type="checkbox" ${s.tickerEnabled?'checked':''} onchange="G.toggleSiteSetting('tickerEnabled',this.checked)"/>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0">
        <div><div style="font-weight:600;font-size:13px">Auto-approve Q&amp;A answers</div><div style="font-size:11px;color:var(--text3)">Publish answers immediately, skipping manual review</div></div>
        <input type="checkbox" ${s.autoApproveAnswers?'checked':''} onchange="G.toggleSiteSetting('autoApproveAnswers',this.checked)"/>
      </div>`;
  }
}

function switchDashTab(tab, btn){
  document.querySelectorAll('#admin-dashboard-modal .tabs .tab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderDashPanel(tab);
}

window.G = {
  openModal, closeModal, closeModalOnOverlay,
  switchAuthTab, loginUser, registerUser, forgotPassword, logoutUser,
  submitQuestion: ()=>{closeModal('ask-modal');notify('Question posted!');},
  handleSearch: ()=>{},
  openAdminDashboard: ()=>{
    if(!isAdmin()){notify('Admin sign-in required.');return;}
    openModal('admin-dashboard-modal');
    switchDashTab('characters', document.querySelector('#admin-dashboard-modal .tabs .tab'));
  }
};

window.G.dashRemove = function(type, index) {
  if (!isAdmin()) {
    notify('⚠️ Unauthorized action.');
    return;
  }
  if (type === 'characters') {
    CHARACTERS_DATA.splice(index, 1);
    renderDashPanel('characters');
    notify('🗑️ Character removed.');
  } else if (type === 'gallery') {
    GALLERY_DATA.splice(index, 1);
    renderDashPanel('gallery');
    notify('🗑️ Image removed.');
  }
};

window.G.toggleSiteSetting = function(key, val) {
  const st = loadSiteSettings();
  st[key] = val;
  saveSiteSettings(st);
  applySiteSettings();
  notify('⚙️ Settings saved.');
};

document.addEventListener('DOMContentLoaded', () => {
  applySiteSettings();
});
</script>
</body>
</html>
