name: Auto Fetch GTA 6 News
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Scraper
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node fetch-news.js

      - name: Inject YouTube API Key
        run: |
          sed -i "s/YOUR_YOUTUBE_API_KEY_HERE/${{ secrets.YOUTUBE_API_KEY }}/g" index.html

      - name: Commit updated index.html
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto: inject API key"
          git push
