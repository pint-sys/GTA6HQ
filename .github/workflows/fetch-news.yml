name: Fetch GTA 6 News

on:
  schedule:
    # Runs every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab too

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Call the news-fetch endpoint
        run: |
          curl -s -w "\nHTTP %{http_code}\n" https://gta6hq.vercel.app/api/fetch-news
